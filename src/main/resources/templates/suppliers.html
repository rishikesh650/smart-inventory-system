<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::#suppliers_content})}">

<body>
    <div id="suppliers_content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <p style="color: var(--text-secondary);">Manage your network of global and local suppliers.</p>
            <a th:href="@{/suppliers/add}" class="btn btn-primary">
                <span>+</span> Add New Supplier
            </a>
        </div>

        <div class="stat-grid">
            <div class="card stat-card">
                <p class="stat-label">Active Suppliers</p>
                <p class="stat-value" th:text="${suppliers.size()}">0</p>
            </div>
            <div class="card stat-card">
                <p class="stat-label">Avg. Lead Time</p>
                <p class="stat-value" style="color: var(--info);">3.2 Days</p>
            </div>
            <div class="card stat-card">
                <p class="stat-label">Outstanding POs</p>
                <p class="stat-value" style="color: var(--warning);">12</p>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Supplier Info</th>
                        <th>Contact Person</th>
                        <th>Category</th>
                        <th>Performance</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="supplier : ${suppliers}">
                        <td>
                            <div style="font-weight: 600;" th:text="${supplier.name}">Supplier Name</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);" th:text="${supplier.email}">
                                email@supplier.com</div>
                        </td>
                        <td th:text="${supplier.contactPerson}">Contact</td>
                        <td th:text="${supplier.category != null ? supplier.category.name : 'Uncategorized'}">Category
                        </td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <div
                                    style="flex: 1; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; width: 100px;">
                                    <div style="height: 100%; background: var(--success); width: 92%;"></div>
                                </div>
                                <span style="font-weight: 700; font-size: 0.75rem;">92%</span>
                            </div>
                        </td>
                        <td>
                            <a th:href="@{/suppliers/edit/{id}(id=${supplier.id})}" class="btn"
                                style="background: #f1f5f9; color: var(--text-primary); padding: 0.4rem 0.8rem;">View
                                Profile</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
