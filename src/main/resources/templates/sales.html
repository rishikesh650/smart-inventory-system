<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::#sales_content})}">

<body>
    <div id="sales_content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <p style="color: var(--text-secondary);">Record and track stock movements and sales performance.</p>
        </div>

        <div class="viz-grid">
            <div class="card">
                <h3 style="margin-bottom: 1.5rem;">Record New Sale</h3>
                <form th:action="@{/sales/record}" method="post">
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label for="productId">Select Product</label>
                        <select id="productId" name="productId" class="form-control"
                            style="width: 100%; padding: 0.75rem; border-radius: var(--radius); border: 1px solid var(--border);">
                            <option th:each="product : ${products}" th:value="${product.id}"
                                th:text="${product.name + ' (Stock: ' + (product.inventory != null ? product.inventory.currentStock : 'N/A') + ')'}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label for="quantity">Quantity Sold</label>
                        <input type="number" id="quantity" name="quantity" class="form-control" min="1" required
                            style="width: 100%; padding: 0.75rem; border-radius: var(--radius); border: 1px solid var(--border);">
                    </div>
                    <button type="submit" class="btn btn-primary"
                        style="width: 100%; justify-content: center; padding: 1rem;">
                        Record Transaction
                    </button>
                </form>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 1.5rem;">Sales Performance</h3>
                <div style="text-align: center; padding: 2rem;">
                    <p style="font-size: 0.875rem; color: var(--text-muted);">Today's Revenue</p>
                    <p style="font-size: 2.5rem; font-weight: 800; color: var(--success);">$4,285.00</p>
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 1rem;">+15.4% from yesterday</p>
                </div>
            </div>
        </div>

        <div class="table-container">
            <div style="padding: 1.5rem; border-bottom: 1px solid var(--border);">
                <h3 style="font-weight: 700;">Recent Transactions</h3>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Unit Price</th>
                        <th>Total Amount</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Recent sales logic would go here if provided in model -->
                    <tr>
                        <td colspan="5" style="text-align: center; color: var(--text-muted); padding: 3rem;">
                            Live transaction feed initialized. Data will populate as sales are recorded.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
