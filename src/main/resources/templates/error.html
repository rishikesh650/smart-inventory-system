<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>System Error - SmartInv</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .error-card {
            text-align: center;
            max-width: 600px;
            padding: 3rem;
        }

        .error-code {
            font-size: 5rem;
            font-weight: 800;
            color: #e11d48;
            margin-bottom: 1rem;
        }

        .error-msg {
            color: #64748b;
            margin-bottom: 2rem;
        }

        .debug-info {
            background: #1e293b;
            color: #f8fafc;
            padding: 1.5rem;
            border-radius: 0.5rem;
            text-align: left;
            font-family: monospace;
            font-size: 0.875rem;
            overflow-x: auto;
        }
    </style>
</head>

<body>
    <div class="card error-card">
        <div class="error-code">500</div>
        <h2>Operational Interruption</h2>
        <p class="error-msg">An unexpected error occurred during processing. The system administrator has been notified.
        </p>

        <div class="debug-info" th:if="${error != null}">
            <strong>Error Details:</strong><br />
            <span th:text="${error}">Error details here...</span>
        </div>

        <div style="margin-top: 2rem;">
            <a th:href="@{/dashboard}" class="btn btn-primary">Return to Safety</a>
        </div>
    </div>
</body>

</html>
