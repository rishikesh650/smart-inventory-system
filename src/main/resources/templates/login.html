<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Auth | SmartInv</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 1rem;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-header .logo {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .brand-header .logo-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
        }

        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8125rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .credential-pill {
            display: inline-block;
            background: #f1f5f9;
            padding: 0.25rem 0.625rem;
            border-radius: 9999px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0.25rem;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand-header">
                <div class="logo">
                    <div class="logo-dot"></div>
                    SmartInv <span>Pro</span>
                </div>
                <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.875rem;">Enterprise Resource
                    Intelligence</p>
            </div>

            <div th:if="${param.error}"
                style="background: #fee2e2; color: #b91c1c; padding: 0.875rem; border-radius: 0.75rem; margin-bottom: 2rem; font-size: 0.8125rem; font-weight: 500; border: 1px solid #fecaca;">
                Authentication failed. Please verify your credentials.
            </div>

            <div th:if="${param.registered}"
                style="background: #ecfdf5; color: #059669; padding: 0.875rem; border-radius: 0.75rem; margin-bottom: 2rem; font-size: 0.8125rem; font-weight: 500; border: 1px solid #6ee7b7;">
                Account created successfully. You can now sign in.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label
                        style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.625rem; display: block;">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="admin" required
                        style="background: #f8fafc; border: 1px solid var(--border); padding: 0.875rem; width: 100%; border-radius: 0.75rem; font-size: 0.9375rem;">
                </div>
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label
                        style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.625rem; display: block;">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required
                        style="background: #f8fafc; border: 1px solid var(--border); padding: 0.875rem; width: 100%; border-radius: 0.75rem; font-size: 0.9375rem;">
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width: 100%; justify-content: center; padding: 1rem; font-size: 0.9375rem; border-radius: 0.75rem;">
                    Secure Sign In
                </button>
            </form>

            <div style="margin-top: 1.5rem; text-align: center; font-size: 0.875rem;">
                <span style="color: var(--text-muted);">New to the system?</span>
                <a th:href="@{/register}"
                    style="color: var(--primary); font-weight: 600; text-decoration: none; margin-left: 0.5rem;">Create
                    Account</a>
            </div>

            <div class="auth-footer">
                <p>System maintained by IT Operations</p>
                <p style="margin-top: 0.5rem;">Access: <span class="credential-pill">admin / admin123</span></p>
            </div>
        </div>
    </div>
</body>

</html>
