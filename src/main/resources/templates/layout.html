<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:fragment="layout(content)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartInv Enterprise | Inventory Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Chart.js for enterprise analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="dot"></div>
            SmartInv <span>Pro</span>
        </div>

        <nav class="nav-group">
            <a th:href="@{/dashboard}" class="nav-link">
                <span class="icon">📊</span> Dashboard
            </a>
            <a th:href="@{/products}" class="nav-link" sec:authorize="hasAnyRole('ADMIN', 'MANAGER')">
                <span class="icon">📦</span> Inventory
            </a>
            <a th:href="@{/suppliers}" class="nav-link" sec:authorize="hasAnyRole('ADMIN', 'MANAGER')">
                <span class="icon">🤝</span> Suppliers
            </a>
            <a th:href="@{/sales}" class="nav-link">
                <span class="icon">💰</span> Sales Tracking
            </a>
            <a th:href="@{/admin/orders}" class="nav-link" sec:authorize="hasRole('ADMIN')">
                <span class="icon">📑</span> Procurement
            </a>
        </nav>

        <div style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1.5rem;">
            <a th:href="@{/logout}" class="nav-link" style="color: #f87171;">
                <span class="icon">🚪</span> Logout
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <div>
                <h1 th:text="${pageTitle}">Overview</h1>
                <p style="color: var(--text-muted); font-size: 0.875rem;"
                    th:text="${#temporals.format(#temporals.createNow(), 'EEEE, MMMM dd, yyyy')}"></p>
            </div>
            <div class="user-profile" style="display: flex; align-items: center; gap: 1rem;">
                <div style="text-align: right;">
                    <p style="font-weight: 700; font-size: 0.875rem;" sec:authentication="name">Username</p>
                    <a th:href="@{/logout}"
                        style="font-size: 0.75rem; color: var(--primary); text-decoration: none; font-weight: 600;">Sign
                        Out</a>
                </div>
                <div
                    style="width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-weight: 700;">
                    U
                </div>
            </div>
        </header>

        <div th:replace="${content}"></div>
    </main>

    <script th:inline="javascript">
        // Global Chart.js defaults
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.color = "#64748b";
    </script>
</body>

</html>
